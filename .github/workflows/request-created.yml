name: PIM Request Created

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:

  process-request:

    runs-on: ubuntu-latest

    steps:

      - name: Assign Issue to Manager
        uses: actions/github-script@v7
        with:
          script: |

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number
            });

            const body = issue.data.body;

            function getField(name) {
              const regex = new RegExp(`### ${name}\\s*([\\s\\S]*?)(\\n###|$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : "";
            }

            const email = getField("User Email");
            const groupAssignment = getField("Group Assignment");

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees: ['akshitabajpai19AB']
            });

      - name: Add Approval Comment
        uses: actions/github-script@v7
        with:
          script: |

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number
            });

            const body = issue.data.body;

            function getField(name) {
              const regex = new RegExp(`### ${name}\\s*([\\s\\S]*?)(\\n###|$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : "";
            }

            const email = getField("User Email");
            const groupAssignment = getField("Group Assignment");
            const scope = getField("Scope");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `@akshitabajpai19AB ✅ PIM Request Created\n\n**User Email:** ${email}\n**Group Assignment:** ${groupAssignment}\n**Scope:** ${scope}\n\nManager can approve using:\n\n/approve\n\nOR reject using:\n\n/reject`
              });