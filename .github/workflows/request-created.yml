name: PIM Request Created

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:

  process-request:

    runs-on: ubuntu-latest

    steps:

      - name: Assign Issue to Manager
        uses: actions/github-script@v7
        with:
          script: |

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number
            });

            const body = issue.data.body;

            function getField(name) {
              const regex = new RegExp(`### ${name}\\s*([\\s\\S]*?)(\\n###|$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : "";
            }

            const principalType = getField("Principal Type");
            const email = getField("User Email");
            const groupName = getField("Group Name or Group ID");
            const commonGroups = getField("Common RBAC Groups (Optional)");
            const role = getField("Azure Role");

            let principalInfo = "";
            if (principalType === "User") {
              principalInfo = `**Principal Type:** User\n**Email:** ${email}`;
            } else {
              const groupId = groupName || commonGroups;
              principalInfo = `**Principal Type:** Security Group\n**Group:** ${groupId}`;
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees: ['akshitabajpai19AB']
            });

      - name: Add Approval Comment
        uses: actions/github-script@v7
        with:
          script: |

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number
            });

            const body = issue.data.body;

            function getField(name) {
              const regex = new RegExp(`### ${name}\\s*([\\s\\S]*?)(\\n###|$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : "";
            }

            const principalType = getField("Principal Type");
            const email = getField("User Email");
            const groupName = getField("Group Name or Group ID");
            const commonGroups = getField("Common RBAC Groups (Optional)");
            const role = getField("Azure Role");
            const scope = getField("Scope");

            let principalInfo = "";
            if (principalType === "User") {
              principalInfo = `**Principal Type:** User\n**Email:** ${email}`;
            } else {
              const groupId = groupName || commonGroups;
              principalInfo = `**Principal Type:** Security Group\n**Group:** ${groupId}`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `@akshitabajpai19AB ✅ PIM Request Created\n\n${principalInfo}\n**Role:** ${role}\n**Scope:** ${scope}\n\nManager can approve using:\n\n/approve\n\nOR reject using:\n\n/reject`
              });