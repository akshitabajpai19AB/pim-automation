name: PIM Request Created

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:

  process-request:

    if: contains(github.event.issue.labels.*.name, 'pim-request')

    runs-on: ubuntu-latest

    steps:

      - name: Add Approval Comment
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body:
`✅ PIM Request Created

Manager can approve using:

/approve

OR reject using:

/reject`
            });