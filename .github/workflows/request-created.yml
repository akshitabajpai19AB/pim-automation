name: PIM Request Created

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:

  process-request:

    if: |
      contains(github.event.issue.labels.*.name, 'pim-request') ||
      contains(github.event.issue.labels.*.name, 'PIM REQUEST')

    runs-on: ubuntu-latest

    steps:

      - name: Add Approval Comment
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `✅ PIM Request Created\n\nManager can approve using:\n\n/approve\n\nOR reject using:\n\n/reject`
              });