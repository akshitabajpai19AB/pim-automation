name: Approve Or Reject PIM

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  id-token: write
  contents: read

jobs:

  approve:

    if: contains(github.event.comment.body, '/approve')

    runs-on: ubuntu-latest

    steps:

      - name: Get Issue Details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |

            const issue =
              await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number
              });

            const body = issue.data.body;

            function getField(name) {

              const regex =
                new RegExp(`### ${name}\\s*([\\s\\S]*?)(\\n###|$)`);

              const match = body.match(regex);

              return match ? match[1].trim() : "";
            }

            core.setOutput("scope", getField("Scope"));
            core.setOutput("role", getField("Azure Role"));
            core.setOutput("start_date_time", getField("Start Date & Time"));
            core.setOutput("end_date_time", getField("End Date & Time"));
            core.setOutput("timezone", getField("Timezone"));

      - name: Map Role Definition ID
        id: rolemap
        run: |

          ROLE="${{ steps.issue.outputs.role }}"

          if [ "$ROLE" = "Reader" ]; then
            echo "ROLE_ID=acdd72a7-3385-48ef-bd42-f606fba81ae7" >> $GITHUB_ENV

          elif [ "$ROLE" = "Contributor" ]; then
            echo "ROLE_ID=b24988ac-6180-42a0-ab88-20f7382dd24c" >> $GITHUB_ENV

          elif [ "$ROLE" = "Owner" ]; then
            echo "ROLE_ID=8e3af657-a8ff-443c-a75c-2fe8c4bcb635" >> $GITHUB_ENV

          elif [ "$ROLE" = "Key Vault Administrator" ]; then
            echo "ROLE_ID=00482a5a-887f-4fb3-b363-3b7fe8e74483" >> $GITHUB_ENV

          else
            echo "Unsupported Azure role"
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Convert Timezone to UTC
        id: utctime
        uses: actions/github-script@v7
        with:
          script: |

            const timezoneMap = {
              'IST (UTC+5:30)': 5.5,
              'WIB - Indonesia (UTC+7)': 7,
              'ICT - Thailand (UTC+7)': 7,
              'MYT - Malaysia (UTC+8)': 8,
              'SGT - Singapore (UTC+8)': 8,
              'WITA - Indonesia (UTC+8)': 8,
              'WIT - Indonesia (UTC+9)': 9
            };

            const tz = "${{ steps.issue.outputs.timezone }}";
            const tzOffset = timezoneMap[tz];

            if (tzOffset === undefined) {
              throw new Error(`Unknown timezone: ${tz}`);
            }

            const startStr = "${{ steps.issue.outputs.start_date_time }}";
            const endStr = "${{ steps.issue.outputs.end_date_time }}";

            const startLocal = new Date(startStr);
            const endLocal = new Date(endStr);

            if (isNaN(startLocal.getTime()) || isNaN(endLocal.getTime())) {
              throw new Error(`Invalid date format. Please use: YYYY-MM-DD HH:MM`);
            }

            const offsetMs = tzOffset * 3600000;
            const startUtc = new Date(startLocal.getTime() - offsetMs);
            const endUtc = new Date(endLocal.getTime() - offsetMs);

            core.setOutput("start_utc", startUtc.toISOString());
            core.setOutput("end_utc", endUtc.toISOString());

      - name: Create PIM Request Body
        run: |

          cat > body.json <<EOF
          {
            "properties": {
              "principalId":
                "${{ secrets.USER_OBJECT_ID }}",

              "requestType":
                "SelfActivate",

              "roleDefinitionId":
                "${{ steps.issue.outputs.scope }}/providers/Microsoft.Authorization/roleDefinitions/${{ env.ROLE_ID }}",

              "justification":
                "Approved through GitHub",

              "scheduleInfo": {
                "startDateTime": "${{ steps.utctime.outputs.start_utc }}",
                "expiration": {
                  "type": "AfterDateTime",
                  "endDateTime": "${{ steps.utctime.outputs.end_utc }}"
                }
              }
            }
          }
          EOF

      - name: Activate PIM
        run: |

          az rest \
            --method PUT \
            --uri "https://management.azure.com${{ steps.issue.outputs.scope }}/providers/Microsoft.Authorization/roleAssignmentScheduleRequests/$(uuidgen)?api-version=2020-10-01" \
            --body @body.json

      - name: Comment Approved
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body:
              '✅ PIM Access Approved and Activated Successfully.'
            });

      - name: Add Approved and Completed Labels
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['approved', 'completed']
            });

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });

  reject:

    if: contains(github.event.comment.body, '/reject')

    runs-on: ubuntu-latest

    steps:

      - name: Reject Comment
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body:
              '❌ PIM Access Request Rejected.'
            });

      - name: Add Rejected Label
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['rejected']
            });

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });