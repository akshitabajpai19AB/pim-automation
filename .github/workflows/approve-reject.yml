name: Approve Or Reject PIM

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  id-token: write
  contents: read

jobs:

  approve:

    if: contains(github.event.comment.body, '/approve')

    runs-on: ubuntu-latest

    steps:

      - name: Get Issue Details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |

            const issue =
              await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number
              });

            const body = issue.data.body;

            function getField(name) {

              const regex =
                new RegExp(`### ${name}\\s*([\\s\\S]*?)(\\n###|$)`);

              const match = body.match(regex);

              return match ? match[1].trim() : "";
            }

            core.setOutput(
              "scope",
              getField("Scope")
            );

            core.setOutput(
              "duration",
              getField("Duration Hours")
            );

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Request Body
        run: |

          cat > body.json <<EOF
          {
            "properties": {
              "principalId": "${{ secrets.USER_OBJECT_ID }}",
              "requestType": "SelfActivate",
              "roleDefinitionId": "${{ steps.issue.outputs.scope }}/providers/Microsoft.Authorization/roleDefinitions/b24988ac-6180-42a0-ab88-20f7382dd24c",
              "justification": "Approved through GitHub",
              "scheduleInfo": {
                "expiration": {
                  "type": "AfterDuration",
                  "duration": "PT${{ steps.issue.outputs.duration }}H"
                }
              }
            }
          }
          EOF

      - name: Activate PIM
        run: |

          az rest \
            --method PUT \
            --uri "https://management.azure.com${{ steps.issue.outputs.scope }}/providers/Microsoft.Authorization/roleAssignmentScheduleRequests/$(uuidgen)?api-version=2020-10-01" \
            --body @body.json

      - name: Comment Approved
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body:
              '✅ PIM Access Approved and Activated Successfully.'
            });

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });



  reject:

    if: contains(github.event.comment.body, '/reject')

    runs-on: ubuntu-latest

    steps:

      - name: Reject Comment
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body:
              '❌ PIM Access Request Rejected.'
            });

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });