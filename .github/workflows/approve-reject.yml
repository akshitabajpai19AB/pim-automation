name: Approve Or Reject PIM

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  id-token: write
  contents: read

jobs:

  approve:

    if: contains(github.event.comment.body, '/approve')

    runs-on: ubuntu-latest

    steps:

      - name: Get Issue Details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |

            const issue =
              await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number
              });

            const body = issue.data.body;

            function getField(name) {

              const regex =
                new RegExp(`### ${name}\\s*([\\s\\S]*?)(\\n###|$)`);

              const match = body.match(regex);

              return match ? match[1].trim() : "";
            }

            core.setOutput("email", getField("User Email"));
            core.setOutput("group_assignment", getField("Group Assignment"));
            core.setOutput("scope", getField("Scope"));
            core.setOutput("activation_type", getField("Activation Type"));
            core.setOutput("start_date_time", getField("Start Date & Time (for Scheduled only)"));
            core.setOutput("end_date_time", getField("End Date & Time (for Scheduled only)"));
            core.setOutput("timezone", getField("Timezone (for Scheduled only)"));

      - name: Validate Activation Type Fields
        uses: actions/github-script@v7
        with:
          script: |
            const activationType = "${{ steps.issue.outputs.activation_type }}";
            const startDateTime = "${{ steps.issue.outputs.start_date_time }}";
            const endDateTime = "${{ steps.issue.outputs.end_date_time }}";
            const timezone = "${{ steps.issue.outputs.timezone }}";

            if (activationType === "Immediate") {
              if (startDateTime.trim() !== "" || endDateTime.trim() !== "" || timezone.trim() !== "") {
                core.setFailed(`❌ Error: For 'Immediate' activation type, do NOT fill in Start Date/Time, End Date/Time, or Timezone fields. These fields must be left empty for Immediate activation.`);
              }
            } else if (activationType === "Scheduled") {
              if (startDateTime.trim() === "" || endDateTime.trim() === "" || timezone.trim() === "") {
                core.setFailed(`❌ Error: For 'Scheduled' activation type, you MUST fill in all three fields: Start Date & Time, End Date & Time, and Timezone. Please reopen the issue and provide these details.`);
              }
            }

      - name: Check User Request Limit
        id: requestlimit
        uses: actions/github-script@v7
        with:
          script: |
            const userEmail = "${{ steps.issue.outputs.email }}";
            
            // Get all closed issues with approved label
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              labels: 'approved,pim-request',
              per_page: 100
            });

            // Count approved requests for this user
            let approvedCount = 0;
            let userRequestIds = [];

            for (const issue of issues.data) {
              const regex = /### User Email\s*\n(\S+)/;
              const match = issue.body.match(regex);
              if (match && match[1].trim() === userEmail.trim()) {
                approvedCount++;
                userRequestIds.push(issue.number);
              }
            }

            core.setOutput("approved_count", approvedCount);
            core.setOutput("user_request_ids", userRequestIds.join(', '));

            if (approvedCount >= 2) {
              core.setFailed(`User ${userEmail} has reached the maximum limit of 2 approved PIM requests. Previous requests: ${userRequestIds.join(', ')}`);
            }

      - name: Map Group to Roles
        id: grouproles
        run: |

          GROUP="${{ steps.issue.outputs.group_assignment }}"

          case "$GROUP" in
            "Platform Engineering Team")
              echo "ROLE_IDS=acdd72a7-3385-48ef-bd42-f606fba81ae7,b24988ac-6180-42a0-ab88-20f7382dd24c" >> $GITHUB_ENV
              echo "ROLE_NAMES=Reader,Contributor" >> $GITHUB_ENV
              ;;
            "Cloud Operations Team")
              echo "ROLE_IDS=b24988ac-6180-42a0-ab88-20f7382dd24c" >> $GITHUB_ENV
              echo "ROLE_NAMES=Contributor" >> $GITHUB_ENV
              ;;
            "Security Team")
              echo "ROLE_IDS=8e3af657-a8ff-443c-a75c-2fe8c4bcb635" >> $GITHUB_ENV
              echo "ROLE_NAMES=Owner" >> $GITHUB_ENV
              ;;
            "Infrastructure Team")
              echo "ROLE_IDS=b24988ac-6180-42a0-ab88-20f7382dd24c" >> $GITHUB_ENV
              echo "ROLE_NAMES=Contributor" >> $GITHUB_ENV
              ;;
            "Application Development Team")
              echo "ROLE_IDS=acdd72a7-3385-48ef-bd42-f606fba81ae7" >> $GITHUB_ENV
              echo "ROLE_NAMES=Reader" >> $GITHUB_ENV
              ;;
            "Data Engineering Team")
              echo "ROLE_IDS=acdd72a7-3385-48ef-bd42-f606fba81ae7,b24988ac-6180-42a0-ab88-20f7382dd24c" >> $GITHUB_ENV
              echo "ROLE_NAMES=Reader,Contributor" >> $GITHUB_ENV
              ;;
            "DevOps Team")
              echo "ROLE_IDS=b24988ac-6180-42a0-ab88-20f7382dd24c" >> $GITHUB_ENV
              echo "ROLE_NAMES=Contributor" >> $GITHUB_ENV
              ;;
            *)
              echo "Unknown group: $GROUP"
              exit 1
              ;;
          esac

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve User Object ID
        id: userobj
        run: |

          EMAIL="${{ steps.issue.outputs.email }}"
          USER_ID=$(az ad user show --id "$EMAIL" --query id -o tsv 2>/dev/null)

          if [ -z "$USER_ID" ]; then
            echo "Error: Unable to find user with email $EMAIL"
            exit 1
          fi

          echo "USER_OBJECT_ID=$USER_ID" >> $GITHUB_ENV

      - name: Convert Timezone to UTC (if Scheduled)
        id: utctime
        if: contains(steps.issue.outputs.activation_type, 'Scheduled')
        uses: actions/github-script@v7
        with:
          script: |

            const timezoneMap = {
              'IST (UTC+5:30)': 5.5,
              'WIB - Indonesia (UTC+7)': 7,
              'ICT - Thailand (UTC+7)': 7,
              'MYT - Malaysia (UTC+8)': 8,
              'SGT - Singapore (UTC+8)': 8,
              'WITA - Indonesia (UTC+8)': 8,
              'WIT - Indonesia (UTC+9)': 9
            };

            const tz = "${{ steps.issue.outputs.timezone }}";
            const tzOffset = timezoneMap[tz];

            if (tzOffset === undefined) {
              throw new Error(`Unknown timezone: ${tz}`);
            }

            const startStr = "${{ steps.issue.outputs.start_date_time }}";
            const endStr = "${{ steps.issue.outputs.end_date_time }}";

            const startLocal = new Date(startStr);
            const endLocal = new Date(endStr);

            if (isNaN(startLocal.getTime()) || isNaN(endLocal.getTime())) {
              throw new Error(`Invalid date format. Please use: YYYY-MM-DD HH:MM`);
            }

            const offsetMs = tzOffset * 3600000;
            const startUtc = new Date(startLocal.getTime() - offsetMs);
            const endUtc = new Date(endLocal.getTime() - offsetMs);

            // Validate duration does not exceed 4 hours
            const durationMs = endUtc.getTime() - startUtc.getTime();
            const durationHours = durationMs / (1000 * 60 * 60);

            if (durationHours > 4) {
              throw new Error(`PIM access duration cannot exceed 4 hours. Requested: ${durationHours.toFixed(2)} hours`);
            }

            if (durationHours <= 0) {
              throw new Error(`End date/time must be after start date/time`);
            }

            core.setOutput("start_utc", startUtc.toISOString());
            core.setOutput("end_utc", endUtc.toISOString());

      - name: Create PIM Request Body
        run: |

          ACTIVATION_TYPE="${{ steps.issue.outputs.activation_type }}"
          ROLE_IDS="${{ env.ROLE_IDS }}"
          USER_ID="${{ env.USER_OBJECT_ID }}"
          SCOPE="${{ steps.issue.outputs.scope }}"

          IFS=',' read -ra ROLES <<< "$ROLE_IDS"
          
          for ROLE_ID in "${ROLES[@]}"; do
            ROLE_ID=$(echo $ROLE_ID | xargs)

            if [ "$ACTIVATION_TYPE" = "Immediate" ]; then

              cat > "body_${ROLE_ID}.json" <<EOF
              {
                "properties": {
                  "principalId": "$USER_ID",
                  "requestType": "SelfActivate",
                  "roleDefinitionId": "$SCOPE/providers/Microsoft.Authorization/roleDefinitions/$ROLE_ID",
                  "justification": "Approved through GitHub",
                  "scheduleInfo": {
                    "expiration": {
                      "type": "AfterDuration",
                      "duration": "PT4H"
                    }
                  }
                }
              }
              EOF

            else

              cat > "body_${ROLE_ID}.json" <<EOF
              {
                "properties": {
                  "principalId": "$USER_ID",
                  "requestType": "SelfActivate",
                  "roleDefinitionId": "$SCOPE/providers/Microsoft.Authorization/roleDefinitions/$ROLE_ID",
                  "justification": "Approved through GitHub",
                  "scheduleInfo": {
                    "startDateTime": "${{ steps.utctime.outputs.start_utc }}",
                    "expiration": {
                      "type": "AfterDateTime",
                      "endDateTime": "${{ steps.utctime.outputs.end_utc }}"
                    }
                  }
                }
              }
              EOF

            fi
          done

      - name: Activate PIM
        run: |

          ROLE_IDS="${{ env.ROLE_IDS }}"
          SCOPE="${{ steps.issue.outputs.scope }}"

          IFS=',' read -ra ROLES <<< "$ROLE_IDS"
          
          for ROLE_ID in "${ROLES[@]}"; do
            ROLE_ID=$(echo $ROLE_ID | xargs)

            az rest \
              --method PUT \
              --uri "https://management.azure.com$SCOPE/providers/Microsoft.Authorization/roleAssignmentScheduleRequests/$(uuidgen)?api-version=2020-10-01" \
              --body @"body_${ROLE_ID}.json"

            echo "PIM request created for role: $ROLE_ID"
          done

      - name: Comment Approved
        uses: actions/github-script@v7
        with:
          script: |

            const activationType = "${{ steps.issue.outputs.activation_type }}";
            const groupAssignment = "${{ steps.issue.outputs.group_assignment }}";
            const userEmail = "${{ steps.issue.outputs.email }}";
            const roleNames = "${{ env.ROLE_NAMES }}";
            let message = "";

            if (activationType === "Immediate") {
              message = `✅ PIM Access Approved and Activated Immediately (4 hours)\n\n**User Email:** ${userEmail}\n**Group Assignment:** ${groupAssignment}\n**Roles Assigned:** ${roleNames}`;
            } else {
              message = `✅ PIM Access Approved and Scheduled for Activation\n\n**User Email:** ${userEmail}\n**Group Assignment:** ${groupAssignment}\n**Roles Assigned:** ${roleNames}\n\n**Start:** ${{ steps.issue.outputs.start_date_time }}\n**End:** ${{ steps.issue.outputs.end_date_time }}\n**Timezone:** ${{ steps.issue.outputs.timezone }}`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: message
            });

      - name: Add Approved and Completed Labels
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['approved', 'completed']
            });

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });

  reject:

    if: contains(github.event.comment.body, '/reject')

    runs-on: ubuntu-latest

    steps:

      - name: Reject Comment
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body:
              '❌ PIM Access Request Rejected.'
            });

      - name: Add Rejected Label
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['rejected']
            });

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });