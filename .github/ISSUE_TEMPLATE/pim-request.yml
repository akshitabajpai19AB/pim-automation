name: Azure PIM Request

description: Request Azure PIM Access

title: "[PIM REQUEST]"

labels:
  - pim-request
  - pending-approval

body:

  - type: markdown
    attributes:
      value: |
        ## ⚠️ PIM Access Request Limits
        
        - **Maximum Requests:** 2 approved requests per user
        - **Duration Limit:** Each request is limited to 4 hours maximum
        - **Immediate Activation:** 4 hours access
        - **Scheduled Activation:** Up to 4 hours from start to end time
        
        Once you have 2 approved active requests, you cannot create new requests until previous ones expire.

  - type: input
    id: email
    attributes:
      label: User Email
      description: Your email address
      placeholder: user@company.com
    validations:
      required: true

  - type: dropdown
    id: group_assignment
    attributes:
      label: Group Assignment
      description: Select the group you belong to (roles are pre-configured per group)
      options:
        - Platform Engineering Team
        - Cloud Operations Team
        - Security Team
        - Infrastructure Team
        - Application Development Team
        - Data Engineering Team
        - DevOps Team
    validations:
      required: true

  - type: input
    id: scope
    attributes:
      label: Scope
      description: Enter Azure scope
      placeholder: /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    validations:
      required: true

  - type: dropdown
    id: activation_type
    attributes:
      label: Activation Type
      description: Choose when to activate PIM access
      options:
        - Immediate
        - Scheduled
    validations:
      required: true

  - type: input
    id: start_date_time
    attributes:
      label: Start Date & Time (ONLY for Scheduled - Leave BLANK for Immediate)
      description: "⚠️ ONLY fill this if you selected 'Scheduled' above. When access should begin (e.g., 2025-12-08 08:00). LEAVE BLANK for Immediate activation."
    validations:
      required: false

  - type: input
    id: end_date_time
    attributes:
      label: End Date & Time (ONLY for Scheduled - Leave BLANK for Immediate)
      description: "⚠️ ONLY fill this if you selected 'Scheduled' above. When access should expire (e.g., 2025-12-10 19:00). Maximum 4 hours from start time. LEAVE BLANK for Immediate activation."
    validations:
      required: false

  - type: dropdown
    id: timezone
    attributes:
      label: Timezone (ONLY for Scheduled - Select only if Scheduled)
      description: "⚠️ ONLY select this if you chose 'Scheduled' above. Leave unselected for Immediate activation."
      options:
        - ""
        - IST (UTC+5:30)
        - WIB - Indonesia (UTC+7)
        - ICT - Thailand (UTC+7)
        - MYT - Malaysia (UTC+8)
        - SGT - Singapore (UTC+8)
        - WITA - Indonesia (UTC+8)
        - WIT - Indonesia (UTC+9)
    validations:
      required: false

  - type: textarea
    id: justification
    attributes:
      label: Business Justification
      description: Explain why access is needed
    validations:
      required: true