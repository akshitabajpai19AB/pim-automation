name: Azure PIM Request

description: Request Azure PIM Access

title: "[PIM REQUEST]"

labels:
  - pim-request
  - pending-approval

body:

  - type: input
    id: email
    attributes:
      label: User Email
      placeholder: user@company.com
    validations:
      required: true

  - type: dropdown
    id: role
    attributes:
      label: Azure Role
      description: Select the Azure role required
      options:
        - Reader
        - Contributor
        - Owner
        - Key Vault Administrator
        - Key Vault Secrets Officer
        - User Access Administrator
        - Storage Blob Data Contributor
        - Storage Blob Data Reader
        - Virtual Machine Contributor
        - Network Contributor
    validations:
      required: true

  - type: input
    id: scope
    attributes:
      label: Scope
      description: Enter Azure scope
      placeholder: /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    validations:
      required: true

  - type: input
    id: duration
    attributes:
      label: Duration Hours
      placeholder: "8"
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Business Justification
      description: Explain why access is needed
    validations:
      required: true