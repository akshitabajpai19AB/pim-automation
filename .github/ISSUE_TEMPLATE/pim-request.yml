name: Azure PIM Request

description: Request Azure PIM Access

title: "[PIM REQUEST]"

labels:
  - pim-request
  - pending-approval

body:

  - type: input
    id: email
    attributes:
      label: User Email
    validations:
      required: true

  - type: dropdown
    id: role
    attributes:
      label: Azure Role
      options:
        - Reader
        - Contributor
        - Key Vault Administrator
    validations:
      required: true

  - type: input
    id: scope
    attributes:
      label: Scope
      placeholder: /subscriptions/xxxxxxxx
    validations:
      required: true

  - type: input
    id: duration
    attributes:
      label: Duration Hours
      placeholder: "8"
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Business Justification
    validations:
      required: true