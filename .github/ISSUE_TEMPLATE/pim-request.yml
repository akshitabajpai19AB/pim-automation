name: Azure PIM Request

description: Request Azure PIM Access

title: "[PIM REQUEST]"

labels:
  - pim-request
  - pending-approval

body:

  - type: dropdown
    id: principal_type
    attributes:
      label: Principal Type
      description: Select whether this is for a User or a Security Group
      options:
        - User
        - Security Group
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: User Email
      description: Email address of the user requiring access
      placeholder: user@company.com
    validations:
      required: false

  - type: input
    id: group_name
    attributes:
      label: Group Name or Group ID
      description: Name or ObjectId of the Azure AD Security Group
      placeholder: group-name or 00000000-0000-0000-0000-000000000000
    validations:
      required: false

  - type: dropdown
    id: common_groups
    attributes:
      label: Common RBAC Groups (Optional)
      description: Select from common security groups if applicable
      options:
        - None - Using custom group
        - Platform Engineering Team
        - Cloud Operations Team
        - Security Team
        - Infrastructure Team
        - Application Development Team
        - Data Engineering Team
        - DevOps Team
    validations:
      required: false

  - type: dropdown
    id: role
    attributes:
      label: Azure Role
      description: Select the Azure role required
      options:
        - Reader
        - Contributor
        - Owner
        - Key Vault Administrator
        - Key Vault Secrets Officer
        - User Access Administrator
        - Storage Blob Data Contributor
        - Storage Blob Data Reader
        - Virtual Machine Contributor
        - Network Contributor
    validations:
      required: true

  - type: input
    id: scope
    attributes:
      label: Scope
      description: Enter Azure scope
      placeholder: /subscriptions/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    validations:
      required: true

  - type: dropdown
    id: activation_type
    attributes:
      label: Activation Type
      description: Choose when to activate PIM access
      options:
        - Immediate
        - Scheduled
    validations:
      required: true

  - type: input
    id: start_date_time
    attributes:
      label: Start Date & Time (for Scheduled only)
      description: When access should begin (e.g., 2025-12-08 08:00). Leave empty for Immediate.
    validations:
      required: false

  - type: input
    id: end_date_time
    attributes:
      label: End Date & Time (for Scheduled only)
      description: When access should expire (e.g., 2025-12-10 19:00). Leave empty for Immediate.
    validations:
      required: false

  - type: dropdown
    id: timezone
    attributes:
      label: Timezone (for Scheduled only)
      description: Select your timezone (required for Scheduled only)
      options:
        - IST (UTC+5:30)
        - WIB - Indonesia (UTC+7)
        - ICT - Thailand (UTC+7)
        - MYT - Malaysia (UTC+8)
        - SGT - Singapore (UTC+8)
        - WITA - Indonesia (UTC+8)
        - WIT - Indonesia (UTC+9)
    validations:
      required: false

  - type: textarea
    id: justification
    attributes:
      label: Business Justification
      description: Explain why access is needed
    validations:
      required: true